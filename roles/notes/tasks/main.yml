---
# ==============================================================================
# NOTES ROLE - SIYUAN PERSONAL KNOWLEDGE MANAGEMENT (Full IaC)
# ==============================================================================
# Deploys SiYuan note-taking system with complete automation:
# - Auto-generates all secrets (OAuth, WebDAV passwords)
# - Auto-configures Authentik OAuth provider (via blueprints)
# - Auto-configures SiYuan OAuth settings (via API)
# - Zero manual steps required!
#
# SERVICES:
# - siyuan: Block-based note editor with graph view
# - siyuan-mcp: MCP server for voice assistant integration
# - siyuan-webdav: WebDAV server for mobile sync
#
# FEATURES:
# - ✅ Infrastructure as Code (IaC) - fully automated
# - ✅ OAuth/OIDC with Authentik (auto-configured)
# - ✅ Mobile sync via WebDAV (auto-configured)
# - ✅ MCP server for voice assistant (auto-deployed)
# - ✅ AI integration with Ollama
# - ✅ Health monitoring
# ==============================================================================

# ==============================================================================
# STEP 1: AUTO-GENERATE SECRETS (IaC)
# ==============================================================================
- name: Auto-generate secrets for SiYuan
  include_tasks: configure_secrets.yml
  tags:
    - secrets
    - iac

# ==============================================================================
# STEP 2: SETUP USER AND DIRECTORIES
# ==============================================================================
- name: Setup notes stack user and directories
  include_tasks: "../playbooks/templates/create_user.yml"
  vars:
    stack: "notes"
    folders: [siyuan, siyuan-mcp]

- name: Copy MCP server files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ storage.appdata_dir }}/siyuan-mcp/{{ item | basename }}"
    owner: "{{ notes.user.name }}"
    group: "{{ notes.group.name }}"
    mode: '0644'
  loop:
    - mcp_server.py
    - requirements.txt
  when: notes.mcp.enabled | default(false)

- name: Pre-pull SiYuan image
  community.docker.docker_image:
    name: "{{ notes.services.siyuan.image }}"
    source: pull
    state: present
    timeout: 300
  register: image_pull
  retries: 2
  delay: 10
  failed_when: false
  tags:
    - images

- name: Report failed image pull
  ansible.builtin.debug:
    msg: "WARNING: Failed to pull SiYuan image. Will retry during compose."
  when: image_pull.failed | default(false)

# ==============================================================================
# STEP 3: DEPLOY CONFIGURATION FILES
# ==============================================================================
- name: Deploy .env file with auto-generated secrets
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ storage.stacks }}/notes/.env"
    owner: "{{ notes.user.name }}"
    group: "{{ notes.group.name }}"
    mode: '0600'
  no_log: true

- name: Deploy notes stack compose file
  ansible.builtin.template:
    src: docker-compose-notes.yml.j2
    dest: "{{ storage.stacks }}/notes/docker-compose.yml"
    owner: "{{ notes.user.name }}"
    group: "{{ notes.group.name }}"
    mode: '0644'

- name: Validate Docker Compose file syntax
  ansible.builtin.command:
    cmd: docker compose -f {{ storage.stacks }}/notes/docker-compose.yml config
  register: compose_config
  changed_when: false
  failed_when: compose_config.rc != 0

- name: Start notes stack containers using compose
  community.docker.docker_compose_v2:
    project_src: "{{ storage.stacks }}/notes"
    state: present
  register: compose_result

- name: Wait for SiYuan port to accept connections
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ notes.services.siyuan.port | int }}"
    timeout: 120
    delay: 5
    state: started
  register: siyuan_port_wait

# ==============================================================================
# STEP 3: AUTO-CONFIGURE SIYUAN VIA API (IaC)
# ==============================================================================
- name: Auto-configure SiYuan OAuth and WebDAV
  include_tasks: configure_siyuan.yml
  tags:
    - configure
    - iac

# ==============================================================================
# DEPLOYMENT SUMMARY
# ==============================================================================
- name: Display SiYuan deployment summary
  ansible.builtin.debug:
    msg: |
      ✅ SiYuan Notes Stack Deployed Successfully

      📝 WEB ACCESS:
         - Main UI: https://notes.{{ network.domain_name }}
         - Direct: http://{{ network.wifi.ip }}:{{ notes.services.siyuan.port }}

      🤖 MCP SERVER (Voice Assistant / LLM Integration):
         - Endpoint: http://{{ network.wifi.ip }}:{{ notes.services.mcp_server.port }}
         - Tools: create_note, search_notes, append_to_note, list_notebooks, get_note
         - Voice Commands: "Create a note about...", "Search my notes for..."

      📱 MOBILE SYNC (WebDAV):
         - WebDAV URL: https://sync.{{ network.domain_name }}
         - Username: {{ notes.user.name }}
         - Password: (from secrets.yml: siyuan_webdav_password)
         - Mobile App: Download SiYuan app → Settings → Cloud Sync → WebDAV

      🔐 AUTHENTIK SSO:
         - Provider: {{ notes.auth.oidc_issuer_url }}
         - Client ID: {{ notes.auth.oidc_client_id }}
         - Setup: SiYuan UI → Settings → Account → OAuth

      🤖 AI INTEGRATION:
         - Ollama: {{ notes.ai.ollama_url }}
         - Model: {{ notes.ai.model }}
         - Features: Summarize, generate titles, expand ideas, find connections

      📊 HEALTH MONITORING:
         - Endpoint: http://siyuan:6806{{ notes.monitoring.health_endpoint }}
         - Health check: Every 30s with Docker healthcheck

      📚 SIYUAN API:
         - Docs: https://notes.{{ network.domain_name }}/api/doc
         - POST /api/notebook/lsNotebooks - List notebooks
         - POST /api/filetree/createDocWithMd - Create note
         - POST /api/search/fullTextSearchBlock - Search notes

      🎯 QUICK START:
         1. Access https://notes.{{ network.domain_name }}
         2. Create your first notebook
         3. Add notes with [[wiki-style links]]
         4. Voice: "Create a note about..."
         5. Mobile: Setup WebDAV sync in SiYuan app
         6. Explore graph view (click graph icon)

      💡 KEY FEATURES:
         ✅ Block-based editing (Notion-like)
         ✅ Bidirectional links & graph view
         ✅ Voice assistant ready (MCP)
         ✅ Mobile sync (WebDAV)
         ✅ SSO support (Authentik)
         ✅ AI-assisted features (Ollama)
         ✅ Markdown storage (future-proof)

      📦 STORAGE:
         - Workspace: {{ storage.appdata_dir }}/siyuan/workspace
         - MCP: {{ storage.appdata_dir }}/siyuan-mcp
         - Stack: {{ storage.stacks }}/notes

      🔧 MANAGEMENT:
         - Logs: docker compose -C {{ storage.stacks }}/notes logs -f
         - Restart: docker compose -C {{ storage.stacks }}/notes restart
         - Backup: tar -czf backup.tar.gz {{ storage.appdata_dir }}/siyuan/workspace

      🌐 URLS:
         - Notes: https://notes.{{ network.domain_name }}
         - Sync: https://sync.{{ network.domain_name }}
         - MCP: http://{{ network.wifi.ip }}:{{ notes.services.mcp_server.port }}
