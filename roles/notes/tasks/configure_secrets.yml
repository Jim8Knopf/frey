---
# ==============================================================================
# AUTO-GENERATE SECRETS FOR SIYUAN NOTES STACK (IaC)
# ==============================================================================
# Generates all required secrets if not already present in secrets.yml
# Fully automated - no manual steps required
# ==============================================================================

- name: Check if secrets file exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../group_vars/all/secrets.yml"
  register: secrets_file

- name: Create secrets dictionary from file if it exists
  ansible.builtin.set_fact:
    existing_secrets: "{{ lookup('file', playbook_dir + '/../group_vars/all/secrets.yml') | from_yaml }}"
  when: secrets_file.stat.exists
  no_log: true

- name: Initialize existing_secrets if file doesn't exist
  ansible.builtin.set_fact:
    existing_secrets: {}
  when: not secrets_file.stat.exists

# ==============================================================================
# GENERATE SIYUAN OAUTH CLIENT SECRET
# ==============================================================================
- name: Check if SiYuan OAuth client secret exists
  ansible.builtin.set_fact:
    siyuan_oauth_secret_exists: "{{ existing_secrets.siyuan_oidc_client_secret is defined and existing_secrets.siyuan_oidc_client_secret != '' }}"
  no_log: true

- name: Generate SiYuan OAuth client secret
  ansible.builtin.set_fact:
    siyuan_oidc_client_secret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  when: not siyuan_oauth_secret_exists
  no_log: true

- name: Use existing SiYuan OAuth client secret
  ansible.builtin.set_fact:
    siyuan_oidc_client_secret: "{{ existing_secrets.siyuan_oidc_client_secret }}"
  when: siyuan_oauth_secret_exists
  no_log: true

# ==============================================================================
# GENERATE WEBDAV SYNC PASSWORD
# ==============================================================================
- name: Check if WebDAV password exists
  ansible.builtin.set_fact:
    webdav_password_exists: "{{ existing_secrets.siyuan_webdav_password is defined and existing_secrets.siyuan_webdav_password != '' }}"
  no_log: true

- name: Generate WebDAV password
  ansible.builtin.set_fact:
    siyuan_webdav_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
  when: not webdav_password_exists
  no_log: true

- name: Use existing WebDAV password
  ansible.builtin.set_fact:
    siyuan_webdav_password: "{{ existing_secrets.siyuan_webdav_password }}"
  when: webdav_password_exists
  no_log: true

# ==============================================================================
# GENERATE SIYUAN ACCESS CODE (Optional, for non-OAuth access)
# ==============================================================================
- name: Check if SiYuan access code exists
  ansible.builtin.set_fact:
    siyuan_access_code_exists: "{{ existing_secrets.siyuan_access_code is defined and existing_secrets.siyuan_access_code != '' }}"
  no_log: true

- name: Generate SiYuan access code
  ansible.builtin.set_fact:
    siyuan_access_code: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
  when: not siyuan_access_code_exists and (notes.auth.access_code is not defined or notes.auth.access_code == '')
  no_log: true

- name: Use existing SiYuan access code
  ansible.builtin.set_fact:
    siyuan_access_code: "{{ existing_secrets.siyuan_access_code }}"
  when: siyuan_access_code_exists
  no_log: true

- name: Use configured access code
  ansible.builtin.set_fact:
    siyuan_access_code: "{{ notes.auth.access_code }}"
  when: notes.auth.access_code is defined and notes.auth.access_code != ''
  no_log: true

# ==============================================================================
# UPDATE SECRETS FILE (if new secrets were generated)
# ==============================================================================
- name: Merge new secrets with existing secrets
  ansible.builtin.set_fact:
    updated_secrets: "{{ existing_secrets | combine({
      'siyuan_oidc_client_secret': siyuan_oidc_client_secret,
      'siyuan_webdav_password': siyuan_webdav_password,
      'siyuan_access_code': siyuan_access_code | default('')
    }) }}"
  no_log: true

- name: Write updated secrets to file
  ansible.builtin.copy:
    content: "{{ updated_secrets | to_nice_yaml(indent=2) }}"
    dest: "{{ playbook_dir }}/../group_vars/all/secrets.yml"
    mode: '0600'
    backup: yes
  when: not siyuan_oauth_secret_exists or not webdav_password_exists
  no_log: true

- name: Display secret generation summary
  ansible.builtin.debug:
    msg: |
      🔐 SiYuan Secrets Status:
         OAuth Client Secret: {{ 'Generated' if not siyuan_oauth_secret_exists else 'Using existing' }}
         WebDAV Password: {{ 'Generated' if not webdav_password_exists else 'Using existing' }}
         Access Code: {{ 'Generated' if siyuan_access_code is defined and siyuan_access_code != '' else 'Not configured' }}

         ⚠️  Secrets saved to: group_vars/all/secrets.yml
         💡 Encrypt with: ansible-vault encrypt group_vars/all/secrets.yml
